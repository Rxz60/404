<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Capture & Link Checker</title>
    <style>
        :root {
            --bg: #0b0f19;
            --panel: #131c2e;
            --green: #00ff66;
            --blue: #3b82f6;
            --red: #ff3366;
            --text: #ffffff;
            --muted: #64748b;
            --border: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .section {
            width: 100%;
            max-width: 850px;
            background: var(--panel);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin-bottom: 25px;
        }

        .upload-zone {
            border: 2px dashed var(--blue);
            border-radius: 12px;
            padding: 30px;
            cursor: pointer;
            background: rgba(59, 130, 246, 0.03);
            margin-bottom: 15px;
        }

        #videoInput { display: none; }

        #videoPreview {
            width: 100%;
            max-height: 350px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            background: #000;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .btn-capture { background: var(--blue); }
        .btn-copy { background: #475569; display: none; }
        .btn-check { background: var(--red); width: auto; padding: 0 20px; }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #1e293b;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--blue), var(--green));
        }

        #progressText {
            margin-top: 8px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .gallery-container {
            width: 100%;
            max-width: 850px;
            display: none;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .capture-card {
            background: #162238;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .capture-card img {
            width: 100%;
            height: auto;
            display: block;
            cursor: pointer;
        }

        .capture-info {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f172a;
            font-size: 0.9rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #4b5563;
            background: #1f2937;
            color: white;
            outline: none;
            text-align: left;
        }

        #checkerResult {
            margin-top: 15px;
            display: none;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #374151;
            background: #000;
        }

        #checkerResult img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            display: block;
            cursor: pointer;
        }

        .viewer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .viewer-overlay img {
            max-width: 95%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 8px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--red);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="section">
        <div class="upload-zone" onclick="document.getElementById('videoInput').click()">
            <input type="file" id="videoInput" accept="video/*">
            <video id="videoPreview" controls></video>
        </div>

        <div class="btn-group">
            <button id="captureBtn" class="btn btn-capture" style="display:none;">رصد</button>
            <button id="copyLinksBtn" class="btn btn-copy">نسخ جميع روابط الصور</button>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <p id="progressText"></p>
        </div>
    </div>

    <div class="gallery-container" id="galleryContainer">
        <div class="gallery" id="gallery"></div>
    </div>

    <div class="section" style="background: #111827;">
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="رابط الصورة المباشر" dir="ltr">
            <button class="btn btn-check" id="checkBtn">فحص</button>
        </div>
        <div id="checkerResult"></div>
    </div>

    <div class="viewer-overlay" id="viewerOverlay">
        <button class="close-btn" id="closeViewer">X</button>
        <img id="viewerImage" src="" alt="">
    </div>

    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        // تكوين بيانات جيت هاب للرفع
        const GITHUB_TOKEN = "ضع_التوكن_الخاص_بمستودعك_هنا"; 
        const GITHUB_REPO = "اسم_المستخدم/اسم_المستودع"; 
        const GITHUB_BRANCH = "main"; 

        const videoInput = document.getElementById('videoInput');
        const videoPreview = document.getElementById('videoPreview');
        const captureBtn = document.getElementById('captureBtn');
        const copyLinksBtn = document.getElementById('copyLinksBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const galleryContainer = document.getElementById('galleryContainer');
        const gallery = document.getElementById('gallery');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const viewerOverlay = document.getElementById('viewerOverlay');
        const viewerImage = document.getElementById('viewerImage');
        const closeViewer = document.getElementById('closeViewer');
        const urlInput = document.getElementById('urlInput');
        const checkBtn = document.getElementById('checkBtn');
        const checkerResult = document.getElementById('checkerResult');

        let duration = 0;
        let uploadedLinks = [];

        videoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                videoPreview.src = URL.createObjectURL(file);
                videoPreview.style.display = 'block';
                captureBtn.style.display = 'block';
                copyLinksBtn.style.display = 'none';
                gallery.innerHTML = '';
                galleryContainer.style.display = 'none';
                progressContainer.style.display = 'none';
                uploadedLinks = [];
                videoPreview.onloadedmetadata = function() { duration = videoPreview.duration; };
            }
        });

        // دالة الرفع إلى GitHub واستخراج رابط الـ raw بنطاق jpg
        async function uploadToGitHub(base64Data, filename) {
            if(GITHUB_TOKEN.startsWith("ضع_")) return null;
            const cleanBase64 = base64Data.split(',')[1];
            const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/${filename}`;
            
            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Upload ${filename}`,
                        content: cleanBase64,
                        branch: GITHUB_BRANCH
                    })
                });
                if(response.ok) {
                    return `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${filename}`;
                }
            } catch(e) { console.error(e); }
            return null;
        }

        captureBtn.addEventListener('click', async function() {
            if (!duration) return;
            captureBtn.disabled = true;
            progressContainer.style.display = 'block';
            galleryContainer.style.display = 'block';
            gallery.innerHTML = '';
            uploadedLinks = [];

            canvas.width = videoPreview.videoWidth;
            canvas.height = videoPreview.videoHeight;

            const step = 0.1; 
            const timestampId = Date.now();

            for (let time = 0; time <= duration; time += step) {
                videoPreview.currentTime = time;
                await new Promise(r => videoPreview.onseeked = r);

                ctx.drawImage(videoPreview, 0, 0, canvas.width, canvas.height);
                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                const formattedTime = time.toFixed(2).replace('.', ',');

                // رفع الصورة أثناء الرصد حبة حبة
                const filename = `snap_${timestampId}_${time.toFixed(2).replace('.', '_')}.jpg`;
                const githubRawUrl = await uploadToGitHub(imgData, filename);
                
                if(githubRawUrl) {
                    uploadedLinks.push(githubRawUrl);
                }

                const card = document.createElement('div');
                card.className = 'capture-card';
                const img = document.createElement('img');
                img.src = imgData;
                img.onclick = () => { viewerImage.src = imgData; viewerOverlay.style.display = 'flex'; };

                const info = document.createElement('div');
                info.className = 'capture-info';
                info.innerHTML = `<span>⏱️ ${formattedTime}</span>`;

                card.appendChild(img);
                card.appendChild(info);
                gallery.appendChild(card);

                const pct = Math.round((time / duration) * 100);
                progressFill.style.width = pct + '%';
                progressText.innerText = `${formattedTime}`;
            }
            captureBtn.disabled = false;
            if(uploadedLinks.length > 0) {
                copyLinksBtn.style.display = 'block';
            }
        });

        // ميزة نسخ جميع الروابط المرسودة بنطاق jpg raw github
        copyLinksBtn.addEventListener('click', function() {
            if(uploadedLinks.length === 0) return;
            const linksText = uploadedLinks.join('\n');
            navigator.clipboard.writeText(linksText).then(() => {
                alert('تم نسخ جميع الروابط بنجاح!');
            });
        });

        closeViewer.onclick = function() { viewerOverlay.style.display = 'none'; };

        checkBtn.addEventListener('click', function() {
            const url = urlInput.value.trim();
            if(!url) return;

            checkerResult.innerHTML = '';
            checkerResult.style.display = 'block';

            const checkedImg = document.createElement('img');
            checkedImg.src = url;
            
            checkedImg.onload = function() {
                checkerResult.appendChild(checkedImg);
                checkedImg.onclick = () => { viewerImage.src = url; viewerOverlay.style.display = 'flex'; };
            };
            checkedImg.onerror = function() {
                checkerResult.innerHTML = `<p style="padding: 15px; color: var(--red);">Error</p>`;
            };
        });
    </script>
</body>
</html>
