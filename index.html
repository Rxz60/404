<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>

document.getElementById("login-btn").onclick = async () => {

const username = document.getElementById("username").value.trim();
const password = document.getElementById("password").value.trim();

if(username !== "TRX" || password !== "HUB"){
alert("❌ خطأ");
return;
}

window.authData = {
username,
password
};

document.getElementById("login-box").classList.add("hidden");
document.getElementById("admin-panel").classList.remove("hidden");

document.getElementById("welcome-name").innerText = "TRX | HUB";

const SERVER_URL = window.location.origin;

const res = await fetch(`${SERVER_URL}/api/list`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(window.authData)
});

const scripts = await res.json();

const filesList = document.getElementById("files-list");
const selectDD = document.getElementById("key-script-select");

filesList.innerHTML = "";
selectDD.innerHTML = "<option value=''>-- اختر --</option>";

for(let id in scripts){

const sc = scripts[id];

if(sc.type === "paid"){

selectDD.innerHTML += `
<option value="${id}">
${id}
</option>
`;

}

filesList.innerHTML += `
<div class="p-3 bg-[#1f2937]/50 rounded-xl border border-gray-700">

<div class="flex justify-between">

<span class="font-mono text-xs">
${id}.lua
</span>

<span class="${sc.active ? 'text-green-400':'text-red-400'} text-[10px]">
${sc.active ? 'شغال':'طافي'}
</span>

</div>

<div class="grid grid-cols-4 gap-1 mt-2">

<button class="bg-green-600 text-[9px] p-1 rounded toggle-on"
data-id="${id}">
تشغيل
</button>

<button class="bg-amber-600 text-[9px] p-1 rounded toggle-off"
data-id="${id}">
إيقاف
</button>

<button class="bg-indigo-600 text-[9px] p-1 rounded show-link"
data-id="${id}"
data-type="${sc.type}">
رابط
</button>

<button class="bg-red-600 text-[9px] p-1 rounded delete-script"
data-id="${id}">
حذف
</button>

</div>

</div>
`;

}

document.querySelectorAll(".toggle-on").forEach(btn=>{

btn.onclick = async () => {

await fetch(`${SERVER_URL}/api/toggle`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
...window.authData,
id:btn.dataset.id,
active:true
})
});

location.reload();

};

});

document.querySelectorAll(".toggle-off").forEach(btn=>{

btn.onclick = async () => {

await fetch(`${SERVER_URL}/api/toggle`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
...window.authData,
id:btn.dataset.id,
active:false
})
});

location.reload();

};

});

document.querySelectorAll(".delete-script").forEach(btn=>{

btn.onclick = async () => {

if(!confirm("حذف؟")) return;

await fetch(`${SERVER_URL}/api/delete-script`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
...window.authData,
id:btn.dataset.id
})
});

location.reload();

};

});

document.querySelectorAll(".show-link").forEach(btn=>{

btn.onclick = () => {

let code = `loadstring(game:HttpGet("${SERVER_URL}/load/${btn.dataset.id}.lua"))()`;

if(btn.dataset.type === "paid"){

code = `_G.Key = "مفتاحك"\n` + code;

}

document.getElementById("final-link-input").value = code;

document.getElementById("result-box").classList.remove("hidden");

};

});

};

document.getElementById("upload-btn").onclick = async () => {

const SERVER_URL = window.location.origin;

const id = document.getElementById("script-id").value.trim();

const source = document.getElementById("source-code").value.trim();

const type = document.querySelector('input[name="script-type"]:checked').value;

if(!id || !source){
alert("املأ الحقول");
return;
}

const res = await fetch(`${SERVER_URL}/api/upload`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
...window.authData,
id,
source,
type
})
});

const data = await res.json();

if(data.success){

let code = `loadstring(game:HttpGet("${SERVER_URL}/load/${id}.lua"))()`;

if(type === "paid"){
code = `_G.Key = "مفتاحك"\n` + code;
}

document.getElementById("final-link-input").value = code;

document.getElementById("result-box").classList.remove("hidden");

alert("✅ تم");

}else{

alert(data.message);

}

};

document.getElementById("generate-key-btn").onclick = async () => {

const SERVER_URL = window.location.origin;

const scriptId = document.getElementById("key-script-select").value;

const duration = document.getElementById("key-duration").value.trim();

if(!scriptId){
alert("اختر سكربت");
return;
}

const res = await fetch(`${SERVER_URL}/api/keys/generate`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
...window.authData,
scriptId,
duration
})
});

const data = await res.json();

if(data.success){

document.getElementById("generated-key-box").classList.remove("hidden");

document.getElementById("generated-key-text").innerText = data.key;

}else{

alert(data.message);

}

};

setInterval(async ()=>{

if(document.getElementById("admin-panel").classList.contains("hidden")) return;

const SERVER_URL = window.location.origin;

const res = await fetch(`${SERVER_URL}/api/keys/list`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(window.authData)
});

const keys = await res.json();

const tbody = document.getElementById("keys-list-tbody");

tbody.innerHTML = "";

keys.forEach(k=>{

tbody.innerHTML += `
<tr class="${k.isExpired ? 'expired-key':'active-key'} border-b border-gray-800">

<td class="py-2 font-mono text-yellow-400 text-[11px]">
${k.key}
</td>

<td class="py-2 font-mono text-xs">
${k.scriptId}.lua
</td>

<td class="py-2">
${k.duration || 'غير محدد'}
</td>

<td class="py-2 ${k.isExpired ? 'text-red-400':'text-green-400'}">
${k.remaining || 'غير محدد'}
</td>

<td class="py-2 ${k.activatedUsername ? 'text-green-400':'text-gray-500'}">
${k.activatedUsername || 'غير مربوط'}
</td>

<td class="py-2 text-center">

<button class="bg-teal-600/30 hover:bg-teal-600 px-2 py-1 rounded text-[10px] reset-key"
data-key="${k.key}">
تصفير
</button>

<button class="bg-red-600/30 hover:bg-red-600 px-2 py-1 rounded text-[10px] delete-key"
data-key="${k.key}">
حذف
</button>

</td>

</tr>
`;

});

document.querySelectorAll(".reset-key").forEach(btn=>{

btn.onclick = async ()=>{

await fetch(`${SERVER_URL}/api/keys/reset`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
...window.authData,
key:btn.dataset.key
})
});

};

});

document.querySelectorAll(".delete-key").forEach(btn=>{

btn.onclick = async ()=>{

await fetch(`${SERVER_URL}/api/keys/delete`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
...window.authData,
key:btn.dataset.key
})
});

btn.parentElement.parentElement.remove();

};

});

},5000);

document.getElementById("copy-generated-btn").onclick = ()=>{

const ta = document.getElementById("final-link-input");

ta.select();

document.execCommand("copy");

alert("تم النسخ");

};

document.getElementById("copy-key-btn").onclick = ()=>{

navigator.clipboard.writeText(
document.getElementById("generated-key-text").innerText
);

alert("تم النسخ");

};

document.addEventListener("keydown",e=>{

if(
e.key === "Enter" &&
!document.getElementById("login-box").classList.contains("hidden")
){
document.getElementById("login-btn").click();
}

});

</script>
