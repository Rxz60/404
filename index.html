<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحلل المتطور للفيديو والصور</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        header h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .section {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid #334155;
        }

        .section h2 {
            margin-bottom: 20px;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
            font-size: 1.5rem;
        }

        /* تحسينات المدخلات والأزرار */
        .file-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .custom-file-upload:hover {
            background-color: var(--accent-hover);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
        }

        button {
            padding: 12px 24px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        /* نظام عرض الصور المستخرجة */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .img-card {
            background-color: #0f172a;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .img-card img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .img-info {
            padding: 12px;
            text-align: center;
            font-size: 0.9rem;
            flex-grow: 1;
        }

        .download-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: var(--accent-color);
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .download-btn:hover {
            background-color: var(--accent-hover);
        }

        /* مربع عرض الصورة الخارجي */
        .url-image-display {
            margin-top: 20px;
            text-align: center;
            background-color: #0f172a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #334155;
            display: none;
        }

        .url-image-display img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        #videoPreview {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .status {
            font-weight: bold;
            color: var(--accent-color);
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>النظام المتطور لاستخراج اللقطات وتحليل الصور</h1>
        <p>قم برفع فيديو لتفكيكه ثانية بثانية، أو جلب أي صورة من رابط خارجي وحفظها فوراً.</p>
    </header>

    <!-- قسم الفيديو -->
    <div class="section">
        <h2>1. تفكيك الفيديو ثانية بثانية</h2>
        <div class="file-input-wrapper">
            <label for="videoInput" class="custom-file-upload">اختر ملف الفيديو من جهازك</label>
            <input type="file" id="videoInput" accept="video/*">
        </div>
        
        <video id="videoPreview" controls></video>
        <div id="processStatus" class="status"></div>
        
        <div class="gallery" id="videoGallery">
            <!-- الصور المستخرجة من الفيديو تظهر هنا تلقائياً -->
        </div>
    </div>

    <!-- قسم جلب الصور من الروابط -->
    <div class="section">
        <h2>2. جلب صورة من رابط خارجي</h2>
        <div class="input-group">
            <input type="text" id="imageUrlInput" placeholder="ضع رابط الصورة الكامل هنا...">
            <button onclick="fetchImageFromUrl()">عرض الصورة وحفظها</button>
        </div>
        
        <div class="url-image-display" id="urlImageBlock">
            <p style="margin-bottom: 10px; color: var(--text-muted);">المربع المخصص للصورة:</p>
            <img id="targetUrlImage" src="" alt="الصورة المستهدفة">
            <button class="download-btn" id="downloadUrlImgBtn" style="border-radius: 5px;">حفظ هذه الصورة في جهازك</button>
        </div>
    </div>
</div>

<!-- عنصر خفي لاستخدامه في معالجة الصور بالفيديو -->
<canvas id="conversionCanvas" style="display: none;"></canvas>

<script>
    const videoInput = document.getElementById('videoInput');
    const videoPreview = document.getElementById('videoPreview');
    const videoGallery = document.getElementById('videoGallery');
    const processStatus = document.getElementById('processStatus');
    const canvas = document.getElementById('conversionCanvas');
    const ctx = canvas.getContext('2d');

    // دالة معالجة الفيديو واستخراج الصور كل ثانية
    videoInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const fileURL = URL.createObjectURL(file);
        videoPreview.src = fileURL;
        videoPreview.style.display = 'block';
        videoGallery.innerHTML = ''; // تنظيف المعرض السابق
        
        videoPreview.onloadedmetadata = function() {
            canvas.width = videoPreview.videoWidth;
            canvas.height = videoPreview.videoHeight;
            processStatus.innerText = "جاري معالجة وتفكيك الفيديو كل ثانية... انتظر قليلاً";
            
            let duration = Math.floor(videoPreview.duration);
            let currentTime = 0;

            // دالة تكرارية متطورة للانتقال عبر الثواني واستخراج الصور دون تهنيج المتصفح
            function extractFrame() {
                if (currentTime <= duration) {
                    videoPreview.currentTime = currentTime;
                } else {
                    processStatus.innerText = "اكتمل استخراج جميع اللقطات بنجاح!";
                }
            }

            videoPreview.onseeked = function() {
                if (currentTime <= duration) {
                    // رسم اللقطة الحالية على الكانفاس الخفي
                    ctx.drawImage(videoPreview, 0, 0, canvas.width, canvas.height);
                    
                    // تحويل الكانفاس إلى رابط صورة Base64 قابل للتحميل دالة الجلب
                    const dataURL = canvas.toDataURL('image/jpeg');
                    
                    // إنشاء الداله للصورة ومعنصرها
                    const card = document.createElement('div');
                    card.className = 'img-card';
                    
                    const img = document.createElement('img');
                    img.src = dataURL;
                    
                    const info = document.createElement('div');
                    info.className = 'img-info';
                    info.innerHTML = `<strong>اللقطة عند الثانية:</strong> ${currentTime} ث`;
                    
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'download-btn';
                    downloadBtn.innerText = 'حفظ الصورة';
                    downloadBtn.onclick = function() {
                        const a = document.createElement('a');
                        a.href = dataURL;
                        a.download = `frame_second_${currentTime}.jpg`;
                        a.click();
                    };
                    
                    card.appendChild(img);
                    card.appendChild(info);
                    card.appendChild(downloadBtn);
                    videoGallery.appendChild(card);
                    
                    currentTime++;
                    extractFrame();
                }
            };

            //  ويبدا الداله التولي بدء عملية الاستخراج
            extractFrame();
        };
    });

    // دالة جلب وعرض الصور من الروابط الخارجية وحفظها
    function fetchImageFromUrl() {
        const url = document.getElementById('imageUrlInput').value.trim();
        const urlBlock = document.getElementById('urlImageBlock');
        const targetImg = document.getElementById('targetUrlImage');
        const downloadBtn = document.getElementById('downloadUrlImgBtn');

        if (!url) {
            alert('الرجاء إدخال رابط صحيح أولاً');
            return;
        }

        targetImg.src = url;
        urlBlock.style.display = 'block';

        // تفعيل زر التحميل للرابط الخارجي
        downloadBtn.onclick = async function() {
            try {
                //  استدعاظ الداله الدوليه محاولة تحميل الصورة لضمان تخطي حواجز الحماية وحفظها مباشرة بطلب فوري
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = 'downloaded_image.jpg';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
            } catch (error) {
                // استدعاء الداله لأ تولي الامر
                const a = document.createElement('a');
                a.href = url;
                a.target = '_blank';
                a.download = 'image.jpg';
                a.click();
            }
        };
    }
</script>

</body>
</html>
