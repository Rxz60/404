<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام المتطور للمعالجة الرسومية</title>
    <style>
        :root {
            --bg-color: #fff5f5; /* أحمر فاتح جداً للموقع بالكامل */
            --card-bg: #ffe3e3; /* درجة متناسقة أغمق قليلاً للصناديق */
            --accent-color: #ff4d4d;
            --accent-hover: #e60000;
            --text-color: #2b0000;
            --text-muted: #801a1a;
            --success-color: #df2020;
            --border-color: #ffb3b3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #ffe3e3, #ffccd5);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(223, 32, 32, 0.1);
            border: 1px solid var(--border-color);
        }

        header h1 {
            color: var(--success-color);
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .section {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .section h2 {
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            font-size: 1.5rem;
            color: var(--success-color);
        }

        .file-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .custom-file-upload:hover {
            background-color: var(--accent-hover);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: #fff;
            color: #000;
            font-size: 1rem;
        }

        .action-btn {
            padding: 12px 24px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
            font-size: 1rem;
        }

        .action-btn:hover {
            opacity: 0.9;
        }

        .bulk-actions {
            margin: 20px 0;
            display: none; /* يظهر فقط عند وجود صور */
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .img-card {
            background-color: #fff;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .img-card img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .img-info {
            padding: 12px;
            text-align: center;
            font-size: 0.95rem;
            flex-grow: 1;
            color: var(--text-color);
            background-color: var(--bg-color);
        }

        .btn-container {
            display: flex;
            border-top: 1px solid var(--border-color);
        }

        .download-btn {
            flex: 2;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .download-btn:hover {
            background-color: var(--accent-hover);
        }

        .raw-btn {
            flex: 1;
            padding: 12px;
            background-color: #444;
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            border-right: 1px solid var(--border-color);
        }

        .raw-btn:hover {
            background-color: #222;
        }

        .url-image-display {
            margin-top: 20px;
            text-align: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .url-image-display img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        #videoPreview {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border: 2px solid var(--border-color);
        }

        .status {
            font-weight: bold;
            color: var(--success-color);
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>نظام التحكم والمعالجة الرسومية المتكامل</h1>
        <p>نظام تشغيل متطور مخصص لاستخراج تفاصيل الوسائط وعرض البيانات الهيكلية تفصيلياً.</p>
    </header>

    <div class="section">
        <h2>استدعاء دالة تفكيك مصفوفة الفيديو الرقمية</h2>
        <div class="file-input-wrapper">
            <label for="videoInput" class="custom-file-upload">استدعاء ملف الفيديو الحركي</label>
            <input type="file" id="videoInput" accept="video/*">
        </div>
        
        <video id="videoPreview" controls></video>
        <div id="processStatus" class="status"></div>
        
        <div class="bulk-actions" id="bulkActionsPanel">
            <button class="action-btn" id="btnDownloadAll">استدعاء دالة حفظ كل الصور المكتشفة دفعة واحدة</button>
        </div>
        
        <div class="gallery" id="videoGallery"></div>
    </div>

    <div class="section">
        <h2>استدعاء دالة جلب كائنات الصور عبر الرابط المباشر</h2>
        <div class="input-group">
            <input type="text" id="imageUrlInput" placeholder="أدخل مسار الرابط المطلق للمصفوفة الرسومية...">
            <button class="action-btn" id="btnFetchUrl">استدعاء دالة معالجة الرابط الخارجي</button>
        </div>
        
        <div class="url-image-display" id="urlImageBlock">
            <p style="margin-bottom: 10px; color: var(--text-muted);">معاينة الكائن الرسومي المستدعى:</p>
            <img id="targetUrlImage" src="" alt="كائن مجهول">
            <div class="btn-container" style="border-radius: 5px; overflow: hidden;">
                <button class="download-btn" id="downloadUrlImgBtn">استدعاء دالة حفظ الكائن</button>
                <button class="raw-btn" id="rawUrlImgBtn">RAW</button>
            </div>
        </div>
    </div>
</div>

<canvas id="conversionCanvas" style="display: none;"></canvas>

<script>
    // مصفوفة تخزين الكائنات الرسومية المستخرجة
    let global_frames_array = [];

    // استدعاء دالة إعداد المستمعات الأساسية للنظام
    document.getElementById('videoInput').addEventListener('change', function(e) {
        fn_call_execute_video_pipeline(e);
    });

    document.getElementById('btnFetchUrl').addEventListener('click', function() {
        fn_call_fetch_external_resource();
    });

    document.getElementById('btnDownloadAll').addEventListener('click', function() {
        fn_call_trigger_bulk_download();
    });

    // دالة المعالجة الهيكلية لملف الفيديو واستخراج الإطارات الزمنية ثانية بثانية
    function fn_call_execute_video_pipeline(e) {
        const file = e.target.files[0];
        if (!file) return;

        const videoPreview = document.getElementById('videoPreview');
        const videoGallery = document.getElementById('videoGallery');
        const processStatus = document.getElementById('processStatus');
        const canvas = document.getElementById('conversionCanvas');
        const ctx = canvas.getContext('2d');
        const bulkActionsPanel = document.getElementById('bulkActionsPanel');

        const fileURL = URL.createObjectURL(file);
        videoPreview.src = fileURL;
        videoPreview.style.display = 'block';
        videoGallery.innerHTML = ''; 
        global_frames_array = []; 
        bulkActionsPanel.style.display = 'none';
        
        videoPreview.onloadedmetadata = function() {
            canvas.width = videoPreview.videoWidth;
            canvas.height = videoPreview.videoHeight;
            processStatus.innerText = "حالة النظام: جاري استدعاء دالة الفحص والتقطيع لكل ثانية زمنية...";
            
            let duration = Math.floor(videoPreview.duration);
            let currentTime = 0;

            function fn_call_seek_next_frame() {
                if (currentTime <= duration) {
                    videoPreview.currentTime = currentTime;
                } else {
                    processStatus.innerText = "حالة النظام: تم اكتمال تشغيل دالة الاستخراج الشاملة بنجاح.";
                    if(global_frames_array.length > 0) {
                        bulkActionsPanel.style.display = 'block';
                    }
                }
            }

            videoPreview.onseeked = function() {
                if (currentTime <= duration) {
                    ctx.drawImage(videoPreview, 0, 0, canvas.width, canvas.height);
                    const dataURL = canvas.toDataURL('image/jpeg');
                    
                    global_frames_array.push({
                        base64Data: dataURL,
                        index: currentTime
                    });
                    
                    const card = document.createElement('div');
                    card.className = 'img-card';
                    
                    const img = document.createElement('img');
                    img.src = dataURL;
                    
                    const info = document.createElement('div');
                    info.className = 'img-info';
                    info.innerHTML = `<strong>اللقطة الزمنية:</strong> الثانية ${currentTime}`;
                    
                    const btnContainer = document.createElement('div');
                    btnContainer.className = 'btn-container';
                    
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'download-btn';
                    downloadBtn.innerText = 'حفظ الصورة';
                    downloadBtn.onclick = function() {
                        fn_call_download_single_resource(dataURL, `frame_sec_${currentTime}.jpg`);
                    };
                    
                    const rawBtn = document.createElement('button');
                    rawBtn.className = 'raw-btn';
                    rawBtn.innerText = 'RAW';
                    rawBtn.onclick = function() {
                        fn_call_open_raw_window(dataURL);
                    };
                    
                    btnContainer.appendChild(downloadBtn);
                    btnContainer.appendChild(rawBtn);
                    card.appendChild(img);
                    card.appendChild(info);
                    card.appendChild(btnContainer);
                    videoGallery.appendChild(card);
                    
                    currentTime++;
                    fn_call_seek_next_frame();
                }
            };

            fn_call_seek_next_frame();
        };
    }

    // دالة فتح نافذة RAW مستقلة لعرض الصورة بالحجم الكامل لتمكين تصويرها بدقة عالية
    function fn_call_open_raw_window(dataUri) {
        const rawWindow = window.open();
        rawWindow.document.write(`<img src="${dataUri}" style="max-width:100%; height:auto; display:block; margin:auto;" />`);
        rawWindow.document.title = "كائن خام - معالجة كاملة";
    }

    // دالة تصدير وحفظ كائن مفرد لجهاز المستخدم مباشرة
    function fn_call_download_single_resource(uri, filename) {
        const a = document.createElement('a');
        a.href = uri;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    // دالة الحفظ الشامل المتعدد لكافة الإطارات المستخرجة دفعة واحدة تلقائياً
    function fn_call_trigger_bulk_download() {
        if (global_frames_array.length === 0) return;
        
        global_frames_array.forEach((item, index) => {
            setTimeout(() => {
                fn_call_download_single_resource(item.base64Data, `bulk_frame_sec_${item.index}.jpg`);
            }, index * 250); // تأخير ربع ثانية متوالي لضمان قبول المتصفح لتحميل الملفات المتعددة
        });
    }

    // دالة جلب البيانات والروابط الخارجية مع توفير خيارات حفظها وفتحها بنمط RAW
    function fn_call_fetch_external_resource() {
        const url = document.getElementById('imageUrlInput').value.trim();
        const urlBlock = document.getElementById('urlImageBlock');
        const targetImg = document.getElementById('targetUrlImage');
        const downloadBtn = document.getElementById('downloadUrlImgBtn');
        const rawBtn = document.getElementById('rawUrlImgBtn');

        if (!url) {
            alert('خطأ في استدعاء الدالة: لا توجد بيانات مسار مدخلة.');
            return;
        }

        targetImg.src = url;
        urlBlock.style.display = 'block';

        downloadBtn.onclick = async function() {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                fn_call_download_single_resource(blobUrl, 'external_resource.jpg');
                URL.revokeObjectURL(blobUrl);
            } catch (error) {
                fn_call_download_single_resource(url, 'external_resource.jpg');
            }
        };

        rawBtn.onclick = function() {
            fn_call_open_raw_window(url);
        };
    }
</script>

</body>
</html>
